<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320">
  <style>
    .box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; }
    .core { fill: #e3f2fd; stroke: #90caf9; stroke-width: 2; }
    .adaptor { fill: #fff3e0; stroke: #ffcc80; stroke-width: 2; }
    .ui { fill: #e8f5e9; stroke: #a5d6a7; stroke-width: 2; }
    .ui-box { fill: #ffffff; stroke: #81c784; stroke-width: 1; }
    .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 11px; fill: #495057; }
    .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; font-weight: 600; fill: #212529; }
    .layer-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 10px; font-weight: 500; fill: #6c757d; text-transform: uppercase; letter-spacing: 0.5px; }
    .subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 10px; fill: #868e96; }
  </style>
  
  <!-- Application Layer -->
  <rect x="30" y="20" width="540" height="45" rx="6" class="box"/>
  <text x="300" y="48" text-anchor="middle" class="title">Application</text>
  
  <!-- dali-ui layer -->
  <rect x="30" y="80" width="540" height="85" rx="6" class="ui"/>
  <text x="45" y="100" class="layer-label">dali-ui</text>
  
  <!-- dali-ui-foundation box -->
  <rect x="45" y="110" width="175" height="45" rx="4" class="ui-box"/>
  <text x="132" y="130" text-anchor="middle" class="title">dali-ui-foundation</text>
  <text x="132" y="145" text-anchor="middle" class="subtitle">View · Layout · Visuals · Theme</text>
  
  <!-- dali-ui-components box -->
  <rect x="230" y="110" width="175" height="45" rx="4" class="ui-box"/>
  <text x="317" y="130" text-anchor="middle" class="title">dali-ui-components</text>
  <text x="317" y="145" text-anchor="middle" class="subtitle">Buttons · Sliders · Controls</text>
  
  <!-- Additional info -->
  <text x="415" y="130" class="label">Animation</text>
  <text x="415" y="145" class="label">Text</text>
  <text x="480" y="130" class="label">Input</text>
  <text x="480" y="145" class="label">Focus</text>
  
  <!-- dali-adaptor layer -->
  <rect x="30" y="180" width="540" height="55" rx="6" class="adaptor"/>
  <text x="45" y="200" class="layer-label">dali-adaptor</text>
  <text x="300" y="218" text-anchor="middle" class="label">Application Lifecycle · Window Management · Input Events · Timers · Device Status</text>
  
  <!-- dali-core layer -->
  <rect x="30" y="250" width="540" height="55" rx="6" class="core"/>
  <text x="45" y="270" class="layer-label">dali-core</text>
  <text x="300" y="288" text-anchor="middle" class="label">Scene Graph · Actors · Animation · Rendering · Images · Math · GPU Resources</text>
  
  <!-- Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#adb5bd"/>
    </marker>
  </defs>
  <line x1="300" y1="65" x2="300" y2="78" stroke="#adb5bd" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="300" y1="165" x2="300" y2="178" stroke="#adb5bd" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="300" y1="235" x2="300" y2="248" stroke="#adb5bd" stroke-width="1.5" marker-end="url(#arrowhead)"/>
</svg>
