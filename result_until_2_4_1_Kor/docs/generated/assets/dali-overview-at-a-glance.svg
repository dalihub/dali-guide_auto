<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">DALi overview at a glance</title>
  <desc id="desc">A compact visual overview of DALi showing application code, DALi UI, adaptor, core, and platform responsibilities.</desc>
  <defs>
    <style>
      .title { font: 700 28px system-ui, -apple-system, Segoe UI, sans-serif; fill:#0f172a; }
      .label { font: 700 22px system-ui, -apple-system, Segoe UI, sans-serif; fill:#0f172a; }
      .small { font: 15px system-ui, -apple-system, Segoe UI, sans-serif; fill:#475569; }
    </style>
  </defs>
  <rect width="1200" height="520" fill="#f8fafc"/>
  <text x="70" y="58" class="title">DALi application model</text>

  <rect x="90" y="110" width="260" height="95" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="144" y="148" class="label">Application</text>
  <text x="126" y="177" class="small">lifecycle and main loop</text>

  <rect x="470" y="110" width="260" height="95" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="545" y="148" class="label">View Tree</text>
  <text x="508" y="177" class="small">layout, visuals, interaction</text>

  <rect x="850" y="110" width="260" height="95" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
  <text x="915" y="148" class="label">Rendering</text>
  <text x="902" y="177" class="small">animation, effects, render tasks</text>

  <rect x="240" y="305" width="300" height="95" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <text x="306" y="343" class="label">DALi Adaptor</text>
  <text x="284" y="372" class="small">window and platform bridge</text>

  <rect x="660" y="305" width="300" height="95" rx="18" fill="#e2e8f0" stroke="#64748b" stroke-width="3"/>
  <text x="756" y="343" class="label">DALi Core</text>
  <text x="700" y="372" class="small">actors, properties, signals</text>

  <path d="M350 158 L470 158" stroke="#334155" stroke-width="4"/>
  <path d="M730 158 L850 158" stroke="#334155" stroke-width="4"/>
  <path d="M220 205 L335 305" stroke="#334155" stroke-width="4"/>
  <path d="M600 205 L735 305" stroke="#334155" stroke-width="4"/>
  <path d="M980 205 L850 305" stroke="#334155" stroke-width="4"/>

  <text x="70" y="465" class="small">App code builds and changes a retained UI tree. DALi coordinates events, layout, animation, resources, and rendering.</text>
</svg>
