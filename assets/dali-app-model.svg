<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">DALi layered architecture</title>
  <desc id="desc">A simplified layered architecture diagram for DALi, showing application code above dali-ui, dali-adaptor, and dali-core.</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1d2937" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f7f9fc; }
      .panel { fill: #ffffff; stroke: #d9e1ec; stroke-width: 1.5; filter: url(#shadow); }
      .layer1 { fill: #e8f3ff; stroke: #7aa7d9; }
      .layer2 { fill: #eef8f4; stroke: #82bda6; }
      .layer3 { fill: #fff5e7; stroke: #d8aa65; }
      .layer4 { fill: #f3f1ff; stroke: #aaa0d8; }
      .layer5 { fill: #f2f5f8; stroke: #b7c3d0; }
      .layer { stroke-width: 1.7; }
      .title { fill: #1f2937; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 20px; font-weight: 700; }
      .subtitle { fill: #53606f; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 15px; }
      .line { stroke: #9aa9bb; stroke-width: 1.5; stroke-dasharray: 4 6; }
    </style>
  </defs>

  <rect class="bg" width="960" height="520" rx="18"/>
  <rect class="panel" x="80" y="48" width="800" height="424" rx="20"/>

  <rect class="layer layer1" x="170" y="96" width="620" height="70" rx="14"/>
  <text class="title" x="480" y="127" text-anchor="middle">Application Code</text>
  <text class="subtitle" x="480" y="151" text-anchor="middle">screens, handlers, app logic</text>

  <rect class="layer layer2" x="170" y="196" width="620" height="70" rx="14"/>
  <text class="title" x="480" y="227" text-anchor="middle">dali-ui</text>
  <text class="subtitle" x="480" y="251" text-anchor="middle">View, components, layouts, visuals, theme, signals</text>

  <rect class="layer layer3" x="170" y="296" width="620" height="70" rx="14"/>
  <text class="title" x="480" y="327" text-anchor="middle">dali-adaptor</text>
  <text class="subtitle" x="480" y="351" text-anchor="middle">application lifecycle, window, platform integration</text>

  <rect class="layer layer4" x="170" y="396" width="620" height="70" rx="14"/>
  <text class="title" x="480" y="427" text-anchor="middle">dali-core</text>
  <text class="subtitle" x="480" y="451" text-anchor="middle">scene objects, properties, animation, rendering primitives</text>

  <path class="line" d="M480 166 V196"/>
  <path class="line" d="M480 266 V296"/>
  <path class="line" d="M480 366 V396"/>
</svg>
