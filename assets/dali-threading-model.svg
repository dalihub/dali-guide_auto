<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">DALi threading model</title>
  <desc id="desc">A compact diagram showing main thread, optional UI thread, worker tasks, and update/render side.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 28px system-ui, -apple-system, Segoe UI, sans-serif; fill:#0f172a; }
      .label { font: 700 21px system-ui, -apple-system, Segoe UI, sans-serif; fill:#0f172a; }
      .small { font: 15px system-ui, -apple-system, Segoe UI, sans-serif; fill:#475569; }
    </style>
  </defs>
  <rect width="1200" height="560" fill="#f8fafc"/>
  <text x="70" y="58" class="title">Thread boundaries</text>

  <rect x="90" y="105" width="260" height="105" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="150" y="145" class="label">Main Thread</text>
  <text x="132" y="174" class="small">process and task signals</text>

  <rect x="470" y="105" width="260" height="105" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="526" y="145" class="label">Optional UI Thread</text>
  <text x="515" y="174" class="small">normal signals and UI events</text>

  <rect x="850" y="105" width="260" height="105" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
  <text x="900" y="145" class="label">Update / Render</text>
  <text x="910" y="174" class="small">frame processing</text>

  <rect x="470" y="335" width="260" height="105" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <text x="538" y="375" class="label">Worker Tasks</text>
  <text x="515" y="404" class="small">image loading / background work</text>

  <line x1="350" y1="158" x2="470" y2="158" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="730" y1="158" x2="850" y2="158" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="600" y1="335" x2="600" y2="215" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="730" y1="388" x2="900" y2="210" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 8"/>

  <text x="90" y="500" class="small">UI object changes belong on the event/UI side. Update/render callbacks have stricter rules.</text>
</svg>
