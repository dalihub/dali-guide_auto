<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">DALi View composition</title>
  <desc id="desc">A compact diagram showing View as the app-facing object connected to layout, visuals, input, animation, and core actor.</desc>
  <defs>
    <style>
      .title { font: 700 28px system-ui, -apple-system, Segoe UI, sans-serif; fill:#0f172a; }
      .label { font: 700 22px system-ui, -apple-system, Segoe UI, sans-serif; fill:#0f172a; }
      .small { font: 16px system-ui, -apple-system, Segoe UI, sans-serif; fill:#475569; }
    </style>
  </defs>
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="70" y="58" class="title">View is the app-facing UI object</text>

  <circle cx="600" cy="315" r="110" fill="#dbeafe" stroke="#2563eb" stroke-width="5"/>
  <text x="548" y="305" class="label">View</text>
  <text x="518" y="333" class="small">Dali::Ui::View</text>

  <rect x="130" y="135" width="245" height="84" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="210" y="169" class="label">Layout</text>
  <text x="179" y="198" class="small">measure / arrange</text>

  <rect x="825" y="135" width="245" height="84" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <text x="898" y="169" class="label">Visuals</text>
  <text x="870" y="198" class="small">image / color / effect</text>

  <rect x="130" y="410" width="245" height="84" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <text x="216" y="444" class="label">Input</text>
  <text x="188" y="473" class="small">signals / events</text>

  <rect x="825" y="410" width="245" height="84" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
  <text x="885" y="444" class="label">Animation</text>
  <text x="875" y="473" class="small">property-driven</text>

  <rect x="475" y="500" width="250" height="72" rx="18" fill="#e2e8f0" stroke="#64748b" stroke-width="3"/>
  <text x="547" y="532" class="label">Core Actor</text>
  <text x="528" y="558" class="small">property / render tree</text>

  <line x1="385" y1="210" x2="514" y2="260" stroke="#334155" stroke-width="4"/>
  <line x1="815" y1="210" x2="686" y2="260" stroke="#334155" stroke-width="4"/>
  <line x1="385" y1="425" x2="510" y2="365" stroke="#334155" stroke-width="4"/>
  <line x1="815" y1="425" x2="690" y2="365" stroke="#334155" stroke-width="4"/>
  <line x1="600" y1="425" x2="600" y2="500" stroke="#334155" stroke-width="4"/>
</svg>
