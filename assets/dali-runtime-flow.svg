<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">DALi runtime flow</title>
  <desc id="desc">A concise left-to-right runtime flow from Application to Window, View tree, update/render, and screen.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 28px system-ui, -apple-system, Segoe UI, sans-serif; fill:#0f172a; }
      .label { font: 700 21px system-ui, -apple-system, Segoe UI, sans-serif; fill:#0f172a; }
      .small { font: 15px system-ui, -apple-system, Segoe UI, sans-serif; fill:#475569; }
    </style>
  </defs>
  <rect width="1200" height="420" fill="#f8fafc"/>
  <text x="70" y="58" class="title">Runtime flow</text>

  <rect x="70" y="150" width="180" height="96" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="110" y="190" class="label">Application</text>
  <text x="116" y="218" class="small">InitSignal / MainLoop</text>

  <rect x="315" y="150" width="150" height="96" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <text x="354" y="190" class="label">Window</text>
  <text x="352" y="218" class="small">root host</text>

  <rect x="530" y="150" width="170" height="96" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="574" y="190" class="label">View Tree</text>
  <text x="564" y="218" class="small">layout / visuals</text>

  <rect x="765" y="150" width="190" height="96" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
  <text x="800" y="190" class="label">Update / Render</text>
  <text x="812" y="218" class="small">state to pixels</text>

  <rect x="1020" y="150" width="110" height="96" rx="18" fill="#e2e8f0" stroke="#64748b" stroke-width="3"/>
  <text x="1040" y="190" class="label">Screen</text>

  <line x1="250" y1="198" x2="315" y2="198" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="465" y1="198" x2="530" y2="198" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="700" y1="198" x2="765" y2="198" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="955" y1="198" x2="1020" y2="198" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="85" y="320" class="small">Application code changes handles and properties; DALi processes events, layout, animation, and rendering.</text>
</svg>
