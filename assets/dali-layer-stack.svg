<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">DALi layered architecture</title>
  <desc id="desc">A compact stacked architecture diagram from application code through DALi UI, adaptor, core, and platform.</desc>
  <defs>
    <style>
      .title { font: 700 28px system-ui, -apple-system, Segoe UI, sans-serif; fill:#0f172a; }
      .label { font: 700 24px system-ui, -apple-system, Segoe UI, sans-serif; fill:#0f172a; }
      .small { font: 16px system-ui, -apple-system, Segoe UI, sans-serif; fill:#475569; }
    </style>
  </defs>
  <rect width="1200" height="520" fill="#f8fafc"/>
  <text x="70" y="58" class="title">DALi at a glance</text>

  <rect x="150" y="90" width="900" height="64" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="500" y="131" class="label">Application Code</text>

  <rect x="150" y="174" width="900" height="64" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="445" y="215" class="label">DALi UI: View, Layout, Visuals</text>

  <rect x="150" y="258" width="900" height="64" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <text x="428" y="299" class="label">DALi Adaptor: Application, Window</text>

  <rect x="150" y="342" width="900" height="64" rx="14" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
  <text x="438" y="383" class="label">DALi Core: Actor, Signal, Render</text>

  <rect x="150" y="426" width="900" height="44" rx="12" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
  <text x="500" y="455" class="small">Platform / Window System / Graphics</text>

  <path d="M600 154 L600 170" stroke="#334155" stroke-width="4"/>
  <path d="M600 238 L600 254" stroke="#334155" stroke-width="4"/>
  <path d="M600 322 L600 338" stroke="#334155" stroke-width="4"/>
  <path d="M600 406 L600 422" stroke="#334155" stroke-width="4"/>
</svg>
